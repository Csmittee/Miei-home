# =============================================================================
# MIEI HOME — ESPHome: Sonoff Switch / Relay
# Compatible: Sonoff Basic R4, Mini R4, S31, S26, Dual R3
# Flash method: ESPHome OTA adoption (DIY mode) — no soldering required
# =============================================================================
#
# SETUP INSTRUCTIONS (one-time per device):
#   1. Put Sonoff into DIY mode (hold button 5s until LED flashes fast)
#   2. Connect to Sonoff's own WiFi hotspot (ITEAD-xxxxx)
#   3. Open http://10.10.7.1 and enable DIY mode
#   4. Run: esphome run sonoff_switch.yaml
#   5. ESPHome will find and flash it over the network
#   6. After flash: device joins home WiFi and appears in MIEI HOME dashboard
#
# =============================================================================

substitutions:
  device_id: "kitchen_light"        # ← CHANGE THIS per device (no spaces)
  device_name: "Kitchen Light"      # ← Human-readable name shown in dashboard
  room: "kitchen"                   # ← Room assignment
  device_icon: "mdi:light-switch"

esphome:
  name: ${device_id}
  friendly_name: ${device_name}
  project:
    name: mieihome.sonoff_switch
    version: "1.0.0"

esp8266:                            # Sonoff Basic/Mini use ESP8266
  board: esp01_1m                   # Change to esp8285 for Mini R4

# ── WiFi ─────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none             # Keep latency low
  fast_connect: true

  ap:                               # Fallback hotspot if WiFi lost
    ssid: "MIEI-${device_id}"
    password: !secret ap_fallback_password

captive_portal:                     # Serves config page on fallback AP

# ── MQTT (speaks directly to Pi broker) ──────────────────────────────────────
mqtt:
  broker: !secret mqtt_host
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_pass
  client_id: ${device_id}

  # Last Will — Pi knows instantly if device drops off
  will_message:
    topic: mieihome/devices/${device_id}/availability
    payload: offline
    retain: true

  birth_message:
    topic: mieihome/devices/${device_id}/availability
    payload: online
    retain: true

  # Announce device config to Pi on boot
  on_connect:
    - mqtt.publish:
        topic: mieihome/devices/${device_id}/config
        payload: !lambda |-
          return "{\"id\":\"${device_id}\",\"name\":\"${device_name}\",\"room\":\"${room}\",\"type\":\"switch\"}";
        retain: true

# ── OTA updates (Pi pushes new firmware wirelessly) ──────────────────────────
ota:
  platform: esphome
  password: !secret ota_password

  on_begin:
    - light.turn_on:
        id: status_led
        effect: "Flicker"

# ── API (ESPHome native, used only for initial adoption) ─────────────────────
api:
  password: !secret api_password
  reboot_timeout: 0s               # Never reboot just because API disconnects

# ── Logging ──────────────────────────────────────────────────────────────────
logger:
  level: WARN                      # Quiet in production
  logs:
    mqtt: WARN

# ── Switch (the actual relay) ─────────────────────────────────────────────────
switch:
  - platform: gpio
    id: relay
    name: ${device_name}
    pin: GPIO12                    # Sonoff Basic relay pin

    # Publish state to MQTT on every change
    on_turn_on:
      - mqtt.publish:
          topic: mieihome/devices/${device_id}/status
          payload: "ON"
          retain: true
    on_turn_off:
      - mqtt.publish:
          topic: mieihome/devices/${device_id}/status
          payload: "OFF"
          retain: true

    restore_mode: RESTORE_DEFAULT_OFF   # Safe default on power loss

# ── Subscribe to commands from Pi ────────────────────────────────────────────
mqtt:
  on_message:
    - topic: mieihome/devices/${device_id}/command
      then:
        - lambda: |-
            if (x == "ON")  id(relay).turn_on();
            if (x == "OFF") id(relay).turn_off();
            if (x == "TOGGLE") id(relay).toggle();

# ── Physical button (manual override always works) ────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "${device_name} Button"
    on_press:
      - switch.toggle: relay

  # Power monitoring (Sonoff S31 / Dual R3 with power meter)
  # Remove this block if your Sonoff has no power monitoring
  - platform: template
    name: "${device_name} Online"
    id: online_sensor
    lambda: return true;

# ── Power monitoring (optional — S31/Dual R3 only) ───────────────────────────
sensor:
  - platform: wifi_signal
    name: "${device_name} WiFi Signal"
    update_interval: 60s
    on_value:
      - mqtt.publish:
          topic: mieihome/devices/${device_id}/wifi_rssi
          payload: !lambda return to_string((int)x);

  - platform: uptime
    name: "${device_name} Uptime"
    update_interval: 300s

  # Uncomment for Sonoff S31 / Pow R2 (has power monitoring chip)
  # - platform: hlw8012
  #   sel_pin:
  #     number: GPIO12
  #     inverted: true
  #   cf_pin: GPIO04
  #   cf1_pin: GPIO05
  #   current:
  #     name: "${device_name} Current"
  #     on_value:
  #       - mqtt.publish:
  #           topic: mieihome/devices/${device_id}/current
  #           payload: !lambda return to_string(x);
  #   voltage:
  #     name: "${device_name} Voltage"
  #   power:
  #     name: "${device_name} Power"
  #     on_value:
  #       - mqtt.publish:
  #           topic: mieihome/devices/${device_id}/power_w
  #           payload: !lambda return to_string(x);

# ── Status LED ────────────────────────────────────────────────────────────────
light:
  - platform: status_led
    id: status_led
    name: "${device_name} Status LED"
    pin: GPIO13
    effects:
      - strobe:
          name: "Flicker"
          colors:
            - state: true
              duration: 100ms
            - state: false
              duration: 100ms
