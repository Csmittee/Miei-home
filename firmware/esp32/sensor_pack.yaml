# =============================================================================
# MIEI HOME — ESPHome: Sensor Pack
# Covers: motion (PIR), water leak, soil moisture
# Hardware: Any ESP8266/ESP32 dev board + sensors
# One YAML — use substitutions to deploy as any sensor type
# =============================================================================

substitutions:
  device_id: "garden_sensor"        # ← CHANGE per device
  device_name: "Garden Sensor"
  room: "garden"
  sensor_type: "motion"             # motion | leak | soil

esphome:
  name: ${device_id}
  friendly_name: ${device_name}
  project:
    name: miehome.sensor
    version: "1.0.0"

esp8266:
  board: d1_mini                    # Any ESP8266/ESP32 works

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: light            # Sensors tolerate slight latency
  ap:
    ssid: "MIEI-${device_id}"
    password: !secret ap_fallback_password

mqtt:
  broker: !secret mqtt_host
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_pass
  client_id: ${device_id}

  will_message:
    topic: miehome/sensor/${device_id}/availability
    payload: offline
    retain: true

  birth_message:
    topic: miehome/sensor/${device_id}/availability
    payload: online
    retain: true

  on_connect:
    - mqtt.publish:
        topic: miehome/sensor/${device_id}/config
        payload: !lambda |-
          return "{\"id\":\"${device_id}\",\"name\":\"${device_name}\",\"room\":\"${room}\",\"type\":\"${sensor_type}\"}";
        retain: true

ota:
  platform: esphome
  password: !secret ota_password

api:
  password: !secret api_password
  reboot_timeout: 0s

logger:
  level: WARN

# =============================================================================
# MOTION SENSOR (PIR — HC-SR501 or AM312)
# Wiring: VCC → 3.3V, GND → GND, OUT → GPIO pin below
# =============================================================================
binary_sensor:
  - platform: gpio
    id: pir_sensor
    name: "${device_name} Motion"
    pin:
      number: D1                    # GPIO5 on D1 Mini — change as needed
      mode: INPUT
    device_class: motion
    filters:
      - delayed_off: 30s            # Keep "on" for 30s after last trigger

    on_press:
      - mqtt.publish:
          topic: miehome/sensor/${device_id}/state
          payload: "ON"
          retain: true
      - mqtt.publish:
          topic: miehome/sensor/${device_id}/alert
          payload: !lambda |-
            return "{\"type\":\"motion\",\"device\":\"${device_id}\",\"room\":\"${room}\",\"ts\":" + to_string(millis()) + "}";

    on_release:
      - mqtt.publish:
          topic: miehome/sensor/${device_id}/state
          payload: "OFF"
          retain: true

# =============================================================================
# WATER LEAK SENSOR
# Wiring: VCC → 3.3V, GND → GND, DO (digital out) → GPIO pin below
# Typical leak sensors: YL-83, FS-IR02, or bare copper probes
# =============================================================================

  - platform: gpio
    id: leak_sensor
    name: "${device_name} Water Leak"
    pin:
      number: D2                    # GPIO4 — change as needed
      mode: INPUT_PULLUP
      inverted: true                # Most leak sensors are active-LOW
    device_class: moisture

    on_press:
      - mqtt.publish:
          topic: miehome/sensor/${device_id}/state
          payload: "LEAK"
          retain: true
      - mqtt.publish:
          topic: miehome/sensor/${device_id}/alert
          payload: !lambda |-
            return "{\"type\":\"leak\",\"device\":\"${device_id}\",\"room\":\"${room}\",\"CRITICAL\":true,\"ts\":" + to_string(millis()) + "}";
      # Alert fires repeatedly every 30s while leak persists
      - while:
          condition:
            binary_sensor.is_on: leak_sensor
          then:
            - delay: 30s
            - mqtt.publish:
                topic: miehome/sensor/${device_id}/alert
                payload: !lambda |-
                  return "{\"type\":\"leak\",\"device\":\"${device_id}\",\"CRITICAL\":true,\"repeat\":true}";

    on_release:
      - mqtt.publish:
          topic: miehome/sensor/${device_id}/state
          payload: "CLEAR"
          retain: true

# =============================================================================
# SOIL MOISTURE SENSOR (analog)
# Wiring: VCC → 3.3V, GND → GND, AO (analog out) → A0
# Sensor: Capacitive moisture sensor (not resistive — they corrode)
# =============================================================================
sensor:
  - platform: adc
    id: soil_raw
    pin: A0
    name: "${device_name} Soil Raw"
    update_interval: 5min
    internal: true                  # Don't expose raw ADC to dashboard

  - platform: template
    id: soil_moisture
    name: "${device_name} Soil Moisture"
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5min
    lambda: |-
      // Calibrate: 0V = dry (1.0 on ADC), 3.3V = wet (0.0 on ADC)
      // Adjust 0.25 and 0.85 to match your sensor in dry/wet soil
      float raw = id(soil_raw).state;
      float percent = (0.85 - raw) / (0.85 - 0.25) * 100.0;
      return clamp(percent, 0.0f, 100.0f);
    on_value:
      - mqtt.publish:
          topic: miehome/sensor/${device_id}/value
          payload: !lambda return to_string((int)x);
          retain: true
      # Alert if too dry (below 20%)
      - if:
          condition:
            lambda: return x < 20.0;
          then:
            - mqtt.publish:
                topic: miehome/sensor/${device_id}/alert
                payload: !lambda |-
                  return "{\"type\":\"soil_dry\",\"device\":\"${device_id}\",\"room\":\"${room}\",\"value\":" + to_string((int)x) + "}";

  - platform: wifi_signal
    name: "${device_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${device_name} Uptime"
    update_interval: 300s
